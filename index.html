<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1주차 과제 - 볼빨간사춘기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">天眞浪漫</h1>
            <div class="header-icons">
                <span class="saero">SAER⟳</span>
                <span class="hamburger">〉</span>
            </div>
        </header>

        <div class="banner">
            <img src="images/Banner.png" alt="Playground" class="banner-img">
            <div class="banner-overlay"></div>
            <div class="banner-content">
                <p class="sub-text">꾸밈없이 순수한 우리의 낭만</p>
                <h2 class="main-title">天眞浪漫</h2>
                <p class="bottom-text">천 진 낭 만</p>
            </div>
        </div>

        <div class="notice-bar">
            <span>🔔 공지사항</span>
            <span>〉</span>
        </div>

        <div class="artist-main">
            <img src="images/Artist.jpg" alt="Artist Image">
        </div>

        <div class="info-card">
            <div class="info-day">DAY 2</div>
            <div class="white-line"></div>
            <div class="info-name">볼빨간사춘기</div>
        </div>

        <footer class="footer">
            <div class="footer-logo">DEP<span>th</span></div>
            <div class="sns-icons">
                <img src="images/link.png" alt="link">
                <img src="images/github.png" alt="github">
                <img src="images/insta.png" alt="instagram">
                <img src="images/mail.png" alt="mail">
            </div>
            <div class="footer-divider"></div>
            <p class="copyright">
                Copyright © DEPth MJU.<br>
                All Rights Reserved
            </p>
        </footer>
    </div>
</body>
</html>
